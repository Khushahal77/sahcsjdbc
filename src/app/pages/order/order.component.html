<div class="page orders-page">
  <div class="orders-container">
    <h1 class="page-title">My Orders</h1>

    <!-- Empty State -->
    <div *ngIf="orders.length === 0" class="empty-state">
      <div class="empty-state-icon">📦</div>
      <h2 class="empty-state-title">No Orders Yet</h2>
      <p class="empty-state-subtitle">You haven't placed any orders yet.</p>
      <a routerLink="/home" class="btn-start-shopping">Start Shopping</a>
    </div>

    <!-- Orders List -->
    <div *ngIf="orders.length > 0" class="orders-list">
      <div *ngFor="let order of orders" class="order-card">
        <div class="card-header">
          <div class="order-id-section">
            <span class="order-id-label">Order ID</span>
            <h3 class="order-id">{{ order.id }}</h3>
          </div>
          <div class="status-section">
            <span 
              class="status-badge" 
              [ngClass]="getStatusClass(order.status)"
            >
              {{ order.status }}
            </span>
          </div>
        </div>

        <div class="card-body">
          <div class="info-row">
            <div class="info-item">
              <span class="info-label">Order Date</span>
              <p class="info-value">{{ order.date | date: 'MMM dd, yyyy' }}</p>
            </div>
            <div class="info-item">
              <span class="info-label">Total Amount</span>
              <p class="info-value amount">₹{{ order.total }}</p>
            </div>
            <div class="info-item">
              <span class="info-label">Items</span>
              <p class="info-value">{{ order.items }}</p>
            </div>
          </div>
        </div>

        <div class="card-footer">
          <button class="btn-view-details">View Details</button>
        </div>
      </div>
    </div>
  </div>
</div>
