<div class="categories-page">
  <header class="page-header">
    <h1>Categories</h1>
    <p>Browse our medical and wellness products by category.</p>
  </header>

  @for (section of sections; track section.id) {
    <section [id]="section.id" class="category-section">
      <div class="section-banner">
        <img [src]="section.banner" [alt]="section.title" />
      </div>
      <h2 class="section-title">{{ section.title }}</h2>
      <div class="product-grid">
        @for (product of productsByCategory[section.id]; track product.id) {
          <div class="product-card">
            <div class="product-image">
              <img [src]="product.imageUrl" [alt]="product.name" />
            </div>
            <div class="product-content">
              <h3 class="product-name">{{ product.name }}</h3>
              <p class="product-desc">{{ product.description }}</p>
              <div class="product-footer">
                <span class="product-price">&#8377;{{ product.price }}</span>
                <button class="btn-add-cart" (click)="addToCart(product)">
                  Add to Cart
                </button>
              </div>
            </div>
          </div>
        }
      </div>
    </section>
  }
</div>
